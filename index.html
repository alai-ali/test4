<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BSMLH Core System</title>
    <style>
        :root { --bg: #000; --text: #fff; --gold: #f6851b; --secondary: #8e8e93; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; }
        .logo { font-size: 32px; letter-spacing: 8px; margin-bottom: 50px; font-weight: 500; }
        .btn-group { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 15px; }
        .p-btn { background: #fff; color: #000; border: none; padding: 18px; border-radius: 8px; font-weight: 600; font-size: 16px; cursor: pointer; }
        .s-btn { background: transparent; color: #fff; border: 1px solid #333; padding: 18px; border-radius: 8px; font-size: 16px; cursor: pointer; }
        #status-msg { margin-top: 20px; color: var(--gold); font-weight: bold; padding: 0 10px; }
        .dashboard { display: none; padding: 20px; flex-direction: column; gap: 15px; text-align: left; }
    </style>
</head>
<body>

    <div class="container" id="app-content">
        <div id="home-view">
            <div class="logo">BSMLH</div>
            <div class="btn-group">
                <button class="p-btn" onclick="handleAuth('login')">Войти</button>
                <button class="s-btn" onclick="handleAuth('reg')">Регистрация</button>
            </div>
            <div id="status-msg"></div>
        </div>
    </div>

    <div class="dashboard" id="main-dashboard">
        <h2 id="res-name" style="color:var(--gold);"></h2>
        <p id="res-huid" style="color:var(--secondary); font-family:monospace;"></p>
        <button class="s-btn" style="margin-top:20px;" onclick="location.reload()">Выйти</button>
    </div>

    <script>
        // Простая и надежная проверка: может ли браузер работать с NFC
        const canNFC = 'NDEFReader' in window;

        function handleAuth(mode) {
            const status = document.getElementById('status-msg');
            
            if (canNFC) {
                // ЛОГИКА ДЛЯ ANDROID (NFC)
                if (mode === 'reg') startNFCRegistration();
                else startNFCLogin();
            } else {
                // ЛОГИКА ДЛЯ IPHONE (Альтернативный вход)
                status.innerHTML = `
                    <div style="color:#ff4545; margin-bottom:10px;">NFC заблокирован Apple</div>
                    <p style="font-size:12px; color:#888; margin-bottom:15px;">Используйте секретный код вашего кольца</p>
                    <button class="p-btn" onclick="fallbackManual('${mode}')">Ввести код вручную</button>
                `;
            }
        }

        async function startNFCRegistration() {
            try {
                const ndef = new NDEFReader();
                await ndef.scan();
                document.getElementById('status-msg').innerText = "Приложите кольцо...";
                ndef.onreading = event => {
                    const uid = event.serialNumber;
                    const name = prompt("Ваше Имя:");
                    localStorage.setItem('bs_uid', uid);
                    localStorage.setItem('bs_name', name);
                    alert("Регистрация успешна!");
                    location.reload();
                };
            } catch(e) { alert("Ошибка NFC"); }
        }

        function fallbackManual(mode) {
            if (mode === 'reg') {
                const name = prompt("Введите Имя:");
                const code = prompt("Придумайте секретный код (вместо чипа):");
                localStorage.setItem('bs_uid', code);
                localStorage.setItem('bs_name', name);
                alert("Профиль создан (Manual Mode)");
                location.reload();
            } else {
                const code = prompt("Введите ваш код:");
                if (code === localStorage.getItem('bs_uid')) {
                    showDashboard(localStorage.getItem('bs_name'), "HUID-MANUAL");
                } else {
                    alert("Неверный код");
                }
            }
        }

        function showDashboard(name, huid) {
            document.getElementById('app-content').style.display = 'none';
            document.getElementById('main-dashboard').style.display = 'flex';
            document.getElementById('res-name').innerText = name;
            document.getElementById('res-huid').innerText = huid;
        }

        window.onload = () => {
            // Если мы уже "вошли" раньше (для теста)
        };
    </script>
</body>
</html>
